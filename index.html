<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>전사 리모트워크 실행 현황</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
      body { font-family: 'Noto Sans KR', sans-serif; }
      /* 부드러운 스크롤바 디자인 */
      ::-webkit-scrollbar { width: 8px; }
      ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

      /* 🔴 인쇄 및 PDF 저장용 최적화 스타일 (1페이지 맞춤 적용) */
      @media print {
        @page {
          size: A4 landscape; /* 무조건 가로 방향 인쇄 강제 */
          margin: 8mm;        /* 최소 여백 설정으로 인쇄 영역 극대화 */
        }
        body { 
          background-color: #ffffff !important; 
          -webkit-print-color-adjust: exact; 
          print-color-adjust: exact; 
          padding: 0 !important; 
          margin: 0 !important;
          overflow: hidden; /* 페이지 분할 강제 방지 */
        }
        .shadow-sm, .shadow-md { box-shadow: none !important; border: 1px solid #e2e8f0 !important; }
        /* 인쇄 시 불필요한 필터박스 및 버튼 숨김 처리 */
        .no-print { display: none !important; }
        
        /* 1페이지 맞춤을 위한 여백 및 크기 강제 압축 */
        .max-w-7xl { max-width: 100% !important; width: 100% !important; }
        .p-6 { padding: 0.75rem !important; }
        .p-5 { padding: 0.5rem !important; }
        .mb-6 { margin-bottom: 0.5rem !important; }
        .mt-8 { margin-top: 0.5rem !important; }
        .gap-4 { gap: 0.5rem !important; }
        
        /* 텍스트 크기 조정 */
        h1 { font-size: 1.5rem !important; line-height: 1.75rem !important; }
        p { font-size: 0.8rem !important; line-height: 1.2rem !important; }
        
        /* 요약 카드가 다음 페이지로 쪼개져 출력되는 현상 방지 */
        .grid > div { page-break-inside: avoid; }
